<svg viewBox="0 0 600 280" xmlns="http://www.w3.org/2000/svg">
  <style>
    .t-group { cursor: pointer; }
    .t-box { transition: 0.2s; }
    
    /* Highlight the whole molecule when any part is interacted with */
    .t-group:hover .t-box { fill: #FFF9C4; stroke: #FBC02D; }
    
    /* Vector styles */
    .vector-box { fill: #f8f9fa; stroke: #dee2e6; stroke-width: 1; transition: 0.5s; }
    .vector-cell { fill: #e3f2fd; stroke: #90caf9; opacity: 0.3; transition: 0.5s; }
    .vector-label { font-family: Arial; font-size: 10px; fill: #555; opacity: 0; transition: 0.5s; }
    .fg-highlight { fill: #4caf50; stroke: #2e7d32; opacity: 0; }

    /* Interaction: Show Vector and Label */
    .t-group:hover ~ #vector-group .vector-box { stroke: #FBC02D; stroke-width: 2; }
    .t-group:hover ~ #vector-group .vector-cell { opacity: 1; }
    .t-group:hover ~ #vector-group .vector-label { opacity: 1; }
    .t-group:hover ~ #vector-group .fg-highlight { opacity: 0.8; }
    
    .smiles-char { font-family: Courier New, monospace; font-size: 20px; font-weight: bold; fill: #333; }
  </style>
