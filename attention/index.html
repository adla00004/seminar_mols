<!DOCTYPE html>
<html>
<head>
  <style>
    body, html { margin: 0; padding: 0; overflow: hidden; background-color: white; height: 100%; width: 100%; display: flex; justify-content: center; align-items: center; }
    svg { max-width: 95%; max-height: 95%; }
    
    /* Animation Classes */
    .fade-out { transition: opacity 0.6s ease-out; opacity: 0; pointer-events: none; }
    .fade-in { transition: opacity 0.6s ease-in; opacity: 1; }
    
    /* The Tokens */
    .token { transition: transform 0.5s, opacity 0.3s, fill 0.3s; fill: #eee; stroke: #aaa; stroke-width: 1; }
    .token:hover { fill: #fff9c4; cursor: pointer; }
    .token-text { font-family: 'Courier New', monospace; font-size: 16px; font-weight: bold; text-anchor: middle; pointer-events: none; fill: #333; }
    
    /* The Attention Web */
    .attn-web { fill: none; stroke: rgba(211, 47, 47, 0.2); stroke-width: 0.8; opacity: 0; transition: opacity 0.8s; }
  </style>
</head>
<body>
  <svg viewBox="0 0 700 350" xmlns="http://www.w3.org/2000/svg">
    <rect width="700" height="350" fill="white"/>
    
    <text id="main-title" x="350" y="30" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#333">1. Standard Molecular Representation (2D Graph)</text>

    <g id="scene-2d">
      <path d="M 350,150 L 390,130 L 430,150 L 430,190 L 390,210 L 350,190 Z" fill="none" stroke="#666" stroke-width="2"/>
      <path d="M 310,130 L 350,150 M 390,130 L 390,90 M 430,150 L 470,130 M 430,190 L 470,210" fill="none" stroke="#666" stroke-width="2"/>
      <circle id="2d-nitro" cx="390" cy="90" r="10" fill="#ddd" stroke="#aaa"/>
      <text x="390" y="94" font-family="Arial" font-weight="bold" font-size="10" text-anchor="middle" fill="#666">Ester</text>
      <circle id="2d-amine" cx="310" cy="130" r="10" fill="#ddd" stroke="#aaa"/>
      <text x="310" y="134" font-family="Arial" font-weight="bold" font-size="10" text-anchor="middle" fill="#666">N</text>
    </g>

    <g id="scene-unfold" style="opacity:0;">
      <path d="M 390,100 Q 300,50 100,50" fill="none" stroke="#999" stroke-dasharray="4"/>
      
      <text id="smiles-string" x="350" y="100" text-anchor="middle" font-family="Courier New" font-size="18" font-weight="bold" fill="#666" style="opacity:0;">CCOC(=O)c1ccc(N)cc1</text>
    </g>

    <g id="scene-tokens" transform="translate(110, 160)" style="opacity:0;">
      <g id="attention-web">
        </g>
      
      <g transform="translate(0, 0)">
        <rect id="tok-1" class="token" width="50" height="40" rx="6"/><text x="25" y="26" class="token-text">CCOC</text>
        <rect id="tok-2" class="token" x="60" width="50" height="40" rx="6"/><text x="85" y="26" class="token-text">(=O)</text>
        <rect id="tok-3" class="token" x="120" width="70" height="40" rx="6"/><text x="155" y="26" class="token-text">c1ccc</text>
        <rect id="tok-4" class="token" x="200" width="35" height="40" rx="6"/><text x="217.5" y="26" class="token-text">(N)</text>
        <rect id="tok-5" class="token" x="245" width="50" height="40" rx="6"/><text x="270" y="26" class="token-text">cc1</text>
        
        <text x="330" y="28" font-family="Arial" font-size="20" fill="#ccc">...</text>
        <rect id="tok-end" class="token" x="370" width="110" height="40" rx="6"/><text x="425" y="26" class="token-text">c(O)ccc1N</text>
      </g>
    </g>

    <rect x="580" y="300" width="100" height="40" rx="8" fill="#333" cursor="pointer" onclick="nextStage()"/>
    <text id="btn-text" x="630" y="325" text-anchor="middle" font-family="Arial" font-weight="bold" fill="white" font-size="14" pointer-events="none">Next Step</text>

  </svg>

  <script><![CDATA[
    let stage = 0;
    const title = document.getElementById('main-title');
    const btnText = document.getElementById('btn-text');

    function nextStage() {
      stage++;
      if (stage === 1) {
        // Step 1 -> Step 2: Unfolding
        title.textContent = "2. Unfolding 2D Graph into Linear SMILES";
        title.style.fill = "#555";
        document.getElementById('scene-2d').classList.add('fade-out');
        document.getElementById('scene-unfold').classList.add('fade-in');
        
        // Manual delay for unfolding
        setTimeout(() => {
          document.getElementById('smiles-string').classList.add('fade-in');
        }, 600);

      } else if (stage === 2) {
        // Step 2 -> Step 3: Segmenting into Tokens (Coloured boxes)
        title.textContent = "3. Segmenting String into Chemical Tokens (Lead-Like vocabulary)";
        title.style.fill = "#333";
        document.getElementById('scene-unfold').classList.add('fade-out');
        document.getElementById('scene-tokens').classList.add('fade-in');
        
        // Segmenting effect: Turn string off, boxes on
        setTimeout(() => {
            document.getElementById('tok-1').style.fill = "#e8f5e9"; // Green
            document.getElementById('tok-2').style.fill = "#fff3e0"; // Orange
            document.getElementById('tok-3').style.fill = "#f3e5f5"; // Purple
            document.getElementById('tok-4').style.fill = "#e3f2fd"; // Blue
            document.getElementById('tok-end').style.fill = "#fafafa"; // Gray
        }, 500);

      } else if (stage === 3) {
        // Step 3 -> Step 4: Illustrating Long-Range Dependency
        title.textContent = "4. Identifying Long-Range Dependencies (Functional Connections)";
        
        // Highlight Ester group (Green)
        document.getElementById('tok-1').style.strokeWidth = "2.5";
        document.getElementById('tok-1').style.stroke = "#1b5e20";
        document.getElementById('tok-2').style.strokeWidth = "2.5";
        document.getElementById('tok-2').style.stroke = "#e65100";
        
        // Highlight Amine group (Blue)
        document.getElementById('tok-4').style.strokeWidth = "2.5";
        document.getElementById('tok-4').style.stroke = "#0d47a1";
        document.getElementById('tok-end').style.strokeWidth = "2.5";
        document.getElementById('tok-end').style.stroke = "#9e9e9e";

      } else if (stage === 4) {
        // Step 4 -> Step 5: Self-Attention (Connecting them all)
        title.textContent = "5. The Transformer Architecture: All-to-All Self-Attention";
        title.style.fill = "#d32f2f";
        
        // Generate the web
        const web = document.getElementById('attention-web');
        generateAttentionWeb(web);
        
        // Fade the web in
        setTimeout(() => {
          document.getElementById('attention-web').style.opacity = '1';
        }, 100);
        
        btnText.textContent = "Presentation";
        btnText.style.fill = "#d32f2f";

      }
    }

    // Helper to generate the fully connected web lines
    function generateAttentionWeb(webG) {
        const tokens = [
            { x: 25, y: 20 },  // CCOC
            { x: 85, y: 20 },  // (=O)
            { x: 155, y: 20 }, // c1ccc
            { x: 217, y: 20 }, // (N)
            { x: 270, y: 20 }, // cc1
            { x: 425, y: 20 }  // END c(O)...
        ];

        let lineCode = '';
        for (let i = 0; i < tokens.length; i++) {
            for (let j = i + 1; j < tokens.length; j++) {
                // Calculate curved paths between tokens
                const t1 = tokens[i];
                const t2 = tokens[j];
                const cpY = 20 - (t2.x - t1.x) * 0.15; // Simple curve logic
                lineCode += `<path class="attn-web" d="M ${t1.x},${t1.y} Q ${ (t1.x + t2.x) / 2 },${cpY} ${t2.x},${t2.y}" style="opacity:1" />\n`;
            }
        }
        webG.innerHTML = lineCode;
    }
  ]]></script>
</svg>
</body>
</html>
