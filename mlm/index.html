<svg viewBox="0 0 600 220" xmlns="http://www.w3.org/2000/svg">
  <style>
    .t-group { cursor: pointer; }
    /* Hover on normal tokens */
    .t-group:not(.masked):hover .t-box { fill: #ff5252; stroke: #b71c1c; }
    
    /* Masking styles */
    .mask-box { fill: #333; stroke: #000; transition: 0.3s; }
    .mask-text { fill: white; font-family: Courier; font-weight: bold; transition: 0.3s; }
    .predict-label { font-family: Arial; font-size: 10px; fill: #4caf50; opacity: 0; transition: 0.3s; }

    /* Hover on masked tokens: Show prediction */
    .masked:hover .mask-box { fill: #e8f5e9; stroke: #2e7d32; }
    .masked:hover .mask-text { fill: #2e7d32; }
    .masked:hover .predict-label { opacity: 1; }

    /* SMILES highlighting logic */
    .smiles-char { transition: 0.2s; font-family: Courier New, monospace; font-size: 20px; font-weight: bold; }
    .hidden-char { fill: #ddd; } /* Characters that are currently masked */
    
    .t-group:hover ~ #smiles .smiles-char { fill: #bbb; }
    
    /* Specific ID targeting for the highlight and reveal */
    #g-1:hover ~ #smiles #c-1, #g-2:hover ~ #smiles #c-2, #g-3:hover ~ #smiles #c-3,
    #g-4:hover ~ #smiles #c-4, #g-5:hover ~ #smiles #c-5, #g-6:hover ~ #smiles #c-6,
    #g-8:hover ~ #smiles #c-8, #g-9:hover ~ #smiles #c-9, #g-10:hover ~ #smiles #c-10,
    #g-11:hover ~ #smiles #c-11, #g-12:hover ~ #smiles #c-12, #g-13:hover ~ #smiles #c-13,
    #g-14:hover ~ #smiles #c-14, #g-16:hover ~ #smiles #c-16, #g-17:hover ~ #smiles #c-17,
    #g-18:hover ~ #smiles #c-18, #g-19:hover ~ #smiles #c-19 { fill: #ff5252; font-size: 24px; }

    /* Reveal logic for masked characters */
    #g-7:hover ~ #smiles #c-7 { fill: #2e7d32; font-size: 24px; }
    #g-15:hover ~ #smiles #c-15 { fill: #2e7d32; font-size: 24px; }
  </style>

  <text x="300" y="180" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle" fill="#333">Masked Language Modelling (MLM)</text>
